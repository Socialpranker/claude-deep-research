# GitHub Pages configuration
# This file is processed by Jekyll on the gh-pages branch (if used)
# or by GitHub Pages for the docs/ folder.

title: Deep Research
description: A structured 7-phase meta-research skill for Claude Code. 29 channels, 280+ stat sources, 75 report blocks.
url: https://socialpranker.github.io
baseurl: /claude-deep-research

# SEO
author: Socialpranker
social:
  name: Socialpranker
  links:
    - https://github.com/Socialpranker

# Theme — we use custom HTML, but Jekyll needs something
theme: jekyll-theme-cayman
plugins:
  - jekyll-seo-tag

# Don't process these
exclude:
  - README.md
  - CONTRIBUTING.md
  - LICENSE
